global:
  imagePullSecrets:
    - name: ghcr-pull-secret

secretManager:
  backend: onepassword
  existingSecretName: centaur-infra-env
  envPrefix: ""

api:
  image:
    repository: ghcr.io/birch-hill-labs/centaur-api
    tag: sha-d8c3c0f
    pullPolicy: IfNotPresent
  executionWorkerEnabled: true
  workflowWorkerEnabled: true
  warmPoolEnabled: true
  runtimeCredentialGuardEnabled: true
  egressDiscovery:
    enabled: false

# Birch Hill overlay carrying the obsidian_vault tool + birch-hill-vault skill +
# BH-specific system prompt. Bootstrap manifest also sets these via helm
# parameters; values here are the fallback and what someone reading the chart
# render sees by default.
overlay:
  image:
    repository: ghcr.io/birch-hill-labs/centaur-overlay
    tag: sha-d907651
    pullPolicy: IfNotPresent
    sourcePath: /overlay

sandbox:
  image:
    repository: ghcr.io/birch-hill-labs/centaur-agent
    tag: sha-c52918e
    pullPolicy: IfNotPresent
  runtimeClassName: ""
  # Pin Claude Code to Sonnet 4.6 instead of letting it default to Opus 4.7.
  # Birch Hill's Anthropic tier rate-limits Opus 4.7 to 10k input tokens/min
  # org-wide, which trips a 429 on almost every agent turn. Sonnet 4.6 has
  # ~3-5x the rate budget on the same tier, is ~3x cheaper per token, and is
  # plenty smart for Slack-mention work. Override on a per-turn basis if a
  # specific question genuinely needs Opus.
  #
  # The wrapper reads CLAUDE_MODEL (see services/sandbox/claude-app-wrapper.py
  # in the centaur fork) — NOT the Anthropic SDK's ANTHROPIC_MODEL — and
  # passes it verbatim to `claude --model`. Accepts aliases ("sonnet", "opus",
  # "haiku") or full IDs like "claude-sonnet-4-6".
  extraEnv:
    CLAUDE_MODEL: claude-sonnet-4-6

slackbot:
  enabled: true
  image:
    repository: ghcr.io/birch-hill-labs/centaur-slackbot
    tag: sha-c52918e
    pullPolicy: IfNotPresent

ironProxy:
  image:
    repository: ghcr.io/birch-hill-labs/centaur-iron-proxy
    tag: sha-c52918e
    pullPolicy: IfNotPresent
  # Production uses 1Password Connect (in-cluster Connect server, no SA rate limits).
  secretSource: onepassword-connect
  secretTtl: 10m
  manager:
    secretSource: onepassword-connect

# Deploy the in-cluster 1Password Connect server. Credentials secret
# (centaur-onepassword-connect-credentials) is created out-of-band from
# 1password-credentials.json before this chart installs.
onepasswordConnect:
  connect:
    create: true
    credentialsName: centaur-onepassword-connect-credentials
    credentialsKey: 1password-credentials.json

postgres:
  enabled: true
  auth:
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 20Gi
    # DOKS default StorageClass — provisions DO Block Storage volumes (ext4).
    storageClassName: do-block-storage
    # Mount the PVC at /var/lib/postgresql/data/data instead of /var/lib/postgresql/data
    # so Postgres initdb doesn't trip over ext4's lost+found dir. Requires the
    # postgres.persistence.subPath knob added in birch-hill-labs/centaur PR #1.
    subPath: data

# Public HTTPS ingress for the slackbot (Slack event URL terminates here).
# cert-manager + ingress-nginx are installed as platform services (separate from this chart).
# Chart's ingress template takes a single host string (not a hosts list) and hardcodes
# path "/" to the slackbot service on port 3001.
ingress:
  enabled: true
  className: nginx
  host: centaur.birchhill.io
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    # nginx-ingress applies HTTP→HTTPS redirect per host when any ingress for
    # that host has TLS. That breaks Let's Encrypt's HTTP-01 challenge GET. Slack
    # only ever calls the HTTPS URL anyway, so we lose nothing by disabling the
    # redirect here.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  tls:
    - hosts:
        - centaur.birchhill.io
      secretName: centaur-birchhill-io-tls

networkPolicy:
  enabled: true
  # Allow our ingress controller (deployed in the `ingress-nginx` namespace via
  # the ingress-nginx helm chart) to reach the slackbot and api pods. The chart
  # default only allows `kube-system`, which is where Docker Desktop / kind put
  # their bundled ingresses but NOT where the standard ingress-nginx chart
  # installs. Without this, NetworkPolicy drops nginx→pod traffic and every
  # request 504s, including Let's Encrypt's HTTP-01 challenge.
  ingressControllerNamespaces:
    - kube-system
    - ingress-nginx
