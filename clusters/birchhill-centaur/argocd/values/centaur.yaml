global:
  imagePullSecrets:
    - name: ghcr-pull-secret

secretManager:
  backend: onepassword
  existingSecretName: centaur-infra-env
  envPrefix: ""

# ── api-rs (Rust session control plane, replaces the Python `api`) ───────────
# Was `api:` pre-2026-06-16. The Rust rewrite (services/api-rs) renamed the
# top-level values key and moved several knobs:
#   - default-harness selection lives at `sandbox.harnessEngine` now (single
#     source of truth — drives SESSION_SANDBOX_HARNESS env on apiRs, replaces
#     the old `api.defaultHarness` + `WARM_POOL_HARNESS` env pair)
#   - warm-pool tuning is here as `sandboxWarmPoolSize` etc. (was Python-side)
#   - `runMigrations: true` — apiRs runs DB migrations on startup
apiRs:
  enabled: true
  image:
    repository: ghcr.io/birch-hill-labs/centaur-api-rs
    tag: sha-97dae99
    pullPolicy: IfNotPresent
  sandboxBackend: agent-k8s    # uses agents.x-k8s.io Sandbox CRD
  sandboxWarmPoolSize: 3
  sandboxIdleStopTtlSecs: 10800
  sandboxMaxLifetimeSecs: 259200
  # iron-proxy mode: enabled requires iron-control (the `console` Rails service)
  # to manage secret registration. `auto` falls back to the static iron-proxy
  # config rendered from chart values when iron-control isn't present — which
  # is what we want since console.enabled=false. Without this, api-rs
  # crashloops with "iron-proxy requires iron-control: set IRON_CONTROL_URL
  # and IRON_CONTROL_API_KEY". See services/api-rs/crates/centaur-api-server/
  # src/args.rs:1662 (IronProxyMode enum: Auto, Enabled, Disabled).
  ironProxy:
    mode: auto
  extraEnv: {}

# Required by apiRs when sandboxBackend=agent-k8s (default). Installs the
# upstream agent-sandbox controller + CRDs as a subchart in its own namespace.
agentSandbox:
  enabled: true

# Repo-cache for overlay sources (replaces the old image-mount pattern).
# Pulls listed repos to /var/lib/centaur/repos on each node every
# syncIntervalSeconds; init containers copy the right subdir into each sandbox
# at startup. GitHub token is required because centaur-overlay is a private repo.
repoCache:
  enabled: true
  githubToken:
    existingSecretName: centaur-infra-env
    secretKey: GITHUB_TOKEN

# Ordered overlay sources. Replaces the old `overlay:` image mount pattern —
# our skills + tools now live as a git repo that repo-cache syncs continuously.
# Skill changes become a git push, not a docker buildx + image bump.
overlays:
  sources:
    - repo: birch-hill-labs/centaur-overlay
      ref: main

# Sandbox (Claude Code harness container). Image name unchanged but added
# harnessEngine knob.
sandbox:
  image:
    repository: ghcr.io/birch-hill-labs/centaur-agent
    tag: sha-97dae99
    pullPolicy: IfNotPresent
  runtimeClassName: ""
  # Default harness for warm sandboxes — replaces the old api.defaultHarness +
  # WARM_POOL_HARNESS pair. Values: codex | amp | claudecode (one word, NOT
  # "claude-code"). Per-session sandboxes still respect per-turn --claude
  # overrides.
  harnessEngine: claudecode
  # Pin Claude Code to Sonnet 4.6 (Birch Hill's Anthropic tier rate-limits
  # Opus 4.7 to 10k input tokens/min org-wide → ~every turn 429s). Sonnet 4.6
  # has 3-5× the rate budget on the same tier, is ~3× cheaper per token, and is
  # plenty smart for Slack-mention work. claude-app-wrapper.py reads CLAUDE_MODEL
  # (NOT Anthropic SDK's ANTHROPIC_MODEL).
  extraEnv:
    CLAUDE_MODEL: claude-sonnet-4-6

# Slackbot v2 (TypeScript / Chat SDK, replaces Python slackbot)
slackbotv2:
  enabled: true
  image:
    repository: ghcr.io/birch-hill-labs/centaur-slackbotv2
    tag: sha-97dae99
    pullPolicy: IfNotPresent

# Disabled — Rails web UI (formerly "ironControl"). Not needed yet; revisit
# when we want authenticated browser access to the control plane.
console:
  enabled: false

# Disabled — we use Slack, not Discord.
discordbot:
  enabled: false

ironProxy:
  image:
    repository: ghcr.io/birch-hill-labs/centaur-iron-proxy
    tag: sha-97dae99
    pullPolicy: IfNotPresent
  # Production uses 1Password Connect (in-cluster Connect server, no SA rate limits).
  secretSource: onepassword-connect
  secretTtl: 10m
  manager:
    secretSource: onepassword-connect

# Deploy the in-cluster 1Password Connect server. Credentials secret
# (centaur-onepassword-connect-credentials) is created out-of-band from
# 1password-credentials.json before this chart installs.
onepasswordConnect:
  connect:
    create: true
    credentialsName: centaur-onepassword-connect-credentials
    credentialsKey: 1password-credentials.json

postgres:
  enabled: true
  auth:
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: do-block-storage
    # Mount the PVC at /var/lib/postgresql/data/data instead of /var/lib/postgresql/data
    # so Postgres initdb doesn't trip over ext4's lost+found dir. Chart knob
    # from paradigmxyz/centaur#163.
    subPath: data

# Public HTTPS ingress for the slackbot (Slack event URL terminates here).
# cert-manager + ingress-nginx are installed as platform services (separate
# from this chart). Chart's ingress template takes a single host string and
# routes "/" to the slackbot service on port 3001.
ingress:
  enabled: true
  className: nginx
  host: centaur.birchhill.io
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    # nginx-ingress applies HTTP→HTTPS redirect per host when any ingress for
    # that host has TLS. Breaks Let's Encrypt HTTP-01 challenge GET. Slack
    # only ever calls HTTPS anyway.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  tls:
    - hosts:
        - centaur.birchhill.io
      secretName: centaur-birchhill-io-tls

networkPolicy:
  enabled: true
  # Allow our ingress controller (deployed in `ingress-nginx` namespace via the
  # ingress-nginx helm chart) to reach the slackbot and api pods. Chart default
  # only allows `kube-system`; standard ingress-nginx lives in its own ns.
  ingressControllerNamespaces:
    - kube-system
    - ingress-nginx
