apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: centaur
  namespace: argocd
spec:
  project: default
  sources:
    # 1. Centaur Helm chart — pinned to a specific birch-hill-labs/centaur commit.
    # Synced to paradigmxyz/centaur@main 2026-06-16 (major version migration to
    # the Rust apiRs + slackbotv2 + agent-sandbox CRD architecture). Our fork
    # carries one small CI workflow patch (publish-images.yml IMAGE_NAMESPACE
    # pointed at our GHCR instead of upstream's).
    #
    # All image tags + chart configuration live in the values.yaml referenced
    # below — no helm.parameters here. Bump the sha by updating both
    # targetRevision (here) and the tag fields in values.yaml in the same PR.
    - repoURL: https://github.com/birch-hill-labs/centaur.git
      targetRevision: 1fe051695aa4f9d7f9217dc42827ce2927cafbaf
      path: contrib/chart
      helm:
        valueFiles:
          - $values/clusters/birchhill-centaur/argocd/values/centaur.yaml
    # 2. Values file (this repo's fork).
    - repoURL: https://github.com/birch-hill-labs/centaur-infra.git
      targetRevision: main
      ref: values
    # 3. Optional raw manifests (this repo's fork).
    - repoURL: https://github.com/birch-hill-labs/centaur-infra.git
      targetRevision: main
      path: clusters/birchhill-centaur/argocd/apps/centaur
  destination:
    namespace: centaur-system
    server: https://kubernetes.default.svc
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: baseline
        pod-security.kubernetes.io/warn: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
