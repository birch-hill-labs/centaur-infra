apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: centaur
  namespace: argocd
spec:
  project: default
  sources:
    # 1. Centaur Helm chart — pinned to a specific birch-hill-labs/centaur commit.
    # Synced to paradigmxyz/centaur@main 2026-06-23. Our fork carries CI workflow
    # patches, re-applied on each sync: (1) publish-images.yml IMAGE_NAMESPACE ->
    # our GHCR; (2) publish-images.yml de-Depot'd to GitHub-hosted runners
    # (upstream moved CI to Depot, which we don't use) + a no-depot-guard workflow.
    #
    # All image tags + chart configuration live in the values.yaml referenced
    # below — no helm.parameters here. Bump the sha by updating both
    # targetRevision (here) and the tag fields in values.yaml in the same PR.
    - repoURL: https://github.com/birch-hill-labs/centaur.git
      targetRevision: 4c1999579b0b89b14d1ca9b209d6a1b5bb732290
      path: contrib/chart
      helm:
        valueFiles:
          - $values/clusters/birchhill-centaur/argocd/values/centaur.yaml
    # 2. Values file (this repo's fork).
    - repoURL: https://github.com/birch-hill-labs/centaur-infra.git
      targetRevision: main
      ref: values
    # 3. Optional raw manifests (this repo's fork).
    - repoURL: https://github.com/birch-hill-labs/centaur-infra.git
      targetRevision: main
      path: clusters/birchhill-centaur/argocd/apps/centaur
  destination:
    namespace: centaur-system
    server: https://kubernetes.default.svc
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: baseline
        pod-security.kubernetes.io/warn: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
