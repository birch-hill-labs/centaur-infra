apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: centaur
  namespace: argocd
  # Image-updater annotations omitted until we publish a Birch Hill overlay image.
  # Re-add once ghcr.io/birch-hill-labs/centaur-overlay exists (see phase 2 plan).
spec:
  project: default
  sources:
    # 1. Centaur Helm chart — pinned to a specific birch-hill-labs/centaur commit.
    # Synced to paradigmxyz/centaur@main 2026-05-27 (upstream PRs #163, #164, #170
    # superseded our prior 3 carried patches). The fork now carries only a small
    # CI workflow patch (see .github/workflows/publish-images.yml — IMAGE_NAMESPACE
    # pointed at our GHCR instead of upstream's).
    - repoURL: https://github.com/birch-hill-labs/centaur.git
      targetRevision: ac06cff5
      path: contrib/chart
      helm:
        valueFiles:
          - $values/clusters/birchhill-centaur/argocd/values/centaur.yaml
        parameters:
          # Birch Hill overlay: obsidian_vault tool + birch-hill-vault skill +
          # BH-specific system prompt. Image lives at
          # ghcr.io/birch-hill-labs/centaur-overlay (private), built from
          # birch-hill-labs/centaur-overlay at the SHA below.
          - name: overlay.image.repository
            value: ghcr.io/birch-hill-labs/centaur-overlay
            forceString: true
          - name: overlay.image.tag
            value: sha-d6dc363
            forceString: true
          # Base Centaur image tags. CI publishes ghcr.io/birch-hill-labs/centaur-*
          # at sha-<7> on every push to main (see .github/workflows/publish-images.yml
          # on the fork). All 4 tags below match the same fork commit referenced by
          # targetRevision above; bump together on every fork sync.
          - name: api.image.tag
            value: sha-ac06cff
            forceString: true
          - name: slackbot.image.tag
            value: sha-ac06cff
            forceString: true
          - name: sandbox.image.tag
            value: sha-ac06cff
            forceString: true
          - name: ironProxy.image.tag
            value: sha-ac06cff
            forceString: true
    # 2. Values file (this repo's fork).
    - repoURL: https://github.com/birch-hill-labs/centaur-infra.git
      targetRevision: main
      ref: values
    # 3. Optional raw manifests (this repo's fork).
    - repoURL: https://github.com/birch-hill-labs/centaur-infra.git
      targetRevision: main
      path: clusters/birchhill-centaur/argocd/apps/centaur
  destination:
    namespace: centaur-system
    server: https://kubernetes.default.svc
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: baseline
        pod-security.kubernetes.io/warn: baseline
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
